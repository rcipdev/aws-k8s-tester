# Source: aws-dranet/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dranet-aws-dranet
  namespace: kube-system
  labels:
    helm.sh/chart: aws-dranet-1.0.0
    app.kubernetes.io/name: aws-dranet
    app.kubernetes.io/instance: dranet
    app.kubernetes.io/version: "v1.2.0-eksbuild.2"
    app.kubernetes.io/managed-by: Helm
    tier: node
    app: dranet-aws-dranet
    k8s-app: dranet-aws-dranet
spec:
  selector:
    matchLabels:
      app: dranet-aws-dranet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aws-dranet
        app.kubernetes.io/instance: dranet
        tier: node
        app: dranet-aws-dranet
        k8s-app: dranet-aws-dranet
    spec:
      priorityClassName: "system-node-critical"
      hostNetwork: true
      hostPID: false
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
      serviceAccountName: dranet-aws-dranet
      containers:
      - name: dranet
        args:
        - /dranet
        - --v=4
        - --hostname-override=$(NODE_NAME)
        - "--bind-address=:9177"
        - --cloud-provider-hint=AWS
        - --filter="dra.net/pciDevice" in attributes && attributes["dra.net/pciDevice"].StringValue == "Elastic Fabric Adapter (EFA)"
        image: {{.RdmaDeviceDraDriverImage}}
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 50Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 0
          runAsUser: 0
          seccompProfile:
            type: RuntimeDefault
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9177
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/plugins
        - name: plugin-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: nri-plugin
          mountPath: /var/run/nri
        - name: netns
          mountPath: /var/run/netns
          mountPropagation: HostToContainer
        - name: infiniband
          mountPath: /dev/infiniband
          mountPropagation: HostToContainer
        - name: tmp
          mountPath: /tmp
        - name: dranet-run
          mountPath: /var/run/dranet
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/plugins
          type: DirectoryOrCreate
      - name: plugin-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: DirectoryOrCreate
      - name: nri-plugin
        hostPath:
          path: /var/run/nri
          type: DirectoryOrCreate
      - name: netns
        hostPath:
          path: /var/run/netns
          type: DirectoryOrCreate
      - name: infiniband
        hostPath:
          path: /dev/infiniband
          type: DirectoryOrCreate
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 10Mi
      - name: dranet-run
        hostPath:
          path: /var/run/dranet
          type: DirectoryOrCreate
---
# Source: aws-dranet/templates/deviceclass.yaml
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: efa.networking.k8s.aws
  labels:
    helm.sh/chart: aws-dranet-1.0.0
    app.kubernetes.io/name: aws-dranet
    app.kubernetes.io/instance: dranet
    app.kubernetes.io/version: "v1.2.0-eksbuild.2"
    app.kubernetes.io/managed-by: Helm
spec:
  selectors:
  - cel:
      expression: |
        device.driver == "dra.net" &&
        device.attributes["dra.net"].pciDevice == 'Elastic Fabric Adapter (EFA)'
